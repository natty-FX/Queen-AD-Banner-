<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Queen AD Print Center</title>

<link rel="stylesheet"
href="style.css">

<style>

body{

    margin:0;

    background:#222;

    display:flex;

    flex-direction:column;

    align-items:center;

    overflow:auto;

}

#toolbar{

    width:100%;

    background:#111;

    padding:15px;

    display:flex;

    justify-content:center;

    gap:10px;

    position:sticky;

    top:0;

    z-index:9999;

}

#toolbar button{

    padding:12px 18px;

    border:none;

    border-radius:8px;

    background:#b8860b;

    color:white;

    font-size:15px;

    cursor:pointer;

}

#printContainer{

    position:relative;

    margin:25px 0;

    width:min(1100px,95vw);

    background:white;

}

#printBanner{

    width:100%;

    display:block;

}

#printLayer{

    position:absolute;

    inset:0;

}

.printCircle{

    position:absolute;

    border-radius:50%;

    overflow:hidden;

}

.printCircle img{

    width:100%;

    height:100%;

    object-fit:cover;

}

@media print{

    #toolbar{

        display:none;

    }

    body{

        background:white;

    }

    #printContainer{

        margin:0;

        width:100%;

    }

}

</style>

</head>

<body>

<div id="toolbar">

<button id="backBtn">
⬅ Back
</button>

<button id="printBtn">
🖨 Print
</button>

<button id="downloadBtn">
📥 Download PNG
</button>

</div>

<div id="printContainer">

<img
id="printBanner"
src="qadbanner.png">

<div id="printLayer"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script type="module" src="print.js"></script>

</body>

</html>
